<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SCANNER D'IMAGE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <div class="header">
    <h1>SCANNER D'IMAGE</h1>
    <div class="subtitle">OCR DATA EXTRACTION SYSTEM</div>
  </div>

  <div class="panel">
    <input type="file" id="imageInput" accept="image/*">
    
    <div class="preview-box">
      <img id="preview">
      <button id="scanBtn">SCAN IMAGE</button>
      <div id="status"></div>
    </div>

    <input id="titleInput" placeholder="TITLE">

    <textarea id="output" placeholder="Extracted data..."></textarea>

  

    <button id="saveBtn">SAVE ENTRY</button>
  </div>

  <div class="panel">
    <input id="searchInput" placeholder="SEARCH DATABASE">
    <div id="list"></div>
  </div>

</div>

<!-- bottom actions -->
<div class="bottom-bar">
  <button id="exportBtn">EXPORT</button>
  <button id="importBtn">IMPORT</button>
  <input type="file" id="importFile" hidden>
</div>

<script src="app.js"></script>
</body>
</html>
